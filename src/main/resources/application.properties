server.port=53061
spring.kafka.consumer.bootstrap-servers=localhost:9092,localhost:9094
spring.kafka.consumer.group-id=product-created-events

# * is not recommended for production, specify the packages that contain your event classes
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.mhb.core

# ===================================================================
# Dead Letter Topic (DLT) Configuration
# ===================================================================
# Failed messages (after retries) are published to: <original-topic>.DLT
# Example: product-created-event-topic.DLT
# You need to create this topic in Kafka or enable auto-topic creation

# ===================================================================
# ALTERNATIVE: Properties-based Configuration (Equivalent to Java Config)
# ===================================================================
# Uncomment the properties below to use application.properties instead of
# KafkaConsumerConfiguration.java. Note: The Java @Configuration approach
# provides more flexibility for complex error handling logic and DLT setup.

# ErrorHandlingDeserializer wrapper for both key and value
#spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate deserializers (actual deserializers wrapped by ErrorHandlingDeserializer)
#spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

# JacksonJsonDeserializer specific configurations
#spring.kafka.consumer.properties.spring.json.value.default.type=com.example.mhb.core.ProductCreatedEvent

# Listener error handling - retry and DLT configuration
#spring.kafka.listener.type=batch
#spring.kafka.retry.topic.enabled=true
#spring.kafka.retry.topic.attempts=3
#spring.kafka.retry.topic.delay=1000ms

# Note: DefaultErrorHandler with DeadLetterPublishingRecoverer (configured in Java)
# provides more fine-grained control than properties-based configuration. For complex
# error handling, custom DLT naming, and advanced recovery strategies, Java configuration
# is strongly recommended.